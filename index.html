<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOXBİN FREE SORGU | PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
        }

        /* Ana Arkaplan - Doxbin teması */
        .main-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0d0d1a 0%, #1a0f1a 50%, #0a0a14 100%);
            z-index: -2;
        }

        /* Matrix efekti */
        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.03) 0px, rgba(0,0,0,0) 2px, transparent 4px);
            pointer-events: none;
            z-index: -1;
            animation: matrix 20s linear infinite;
        }

        @keyframes matrix {
            0% { background-position: 0 0; }
            100% { background-position: 0 20px; }
        }

        /* Cam Panel */
        .glass-panel {
            background: rgba(18, 10, 20, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 70, 70, 0.3);
            box-shadow: 0 8px 32px rgba(255, 50, 50, 0.2);
            border-radius: 24px;
            transition: all 0.2s ease;
        }

        .glass-panel:hover {
            border-color: #ff4444;
            box-shadow: 0 8px 40px #ff3333;
        }

        /* Doxbin Başlık */
        .doxbin-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6666, #ff3333, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px #ff4444);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Input */
        .input-doxbin {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #cc3333;
            border-radius: 16px;
            padding: 16px;
            color: #ffaaaa;
            width: 100%;
            font-size: 16px;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .input-doxbin:focus {
            outline: none;
            border-color: #ff6666;
            box-shadow: 0 0 25px #ff3333;
            background: rgba(30, 0, 0, 0.7);
            color: white;
        }

        /* Butonlar */
        .btn-doxbin {
            background: linear-gradient(135deg, #cc3333, #661111);
            border: 1px solid #ff6666;
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(200, 50, 50, 0.3);
        }

        .btn-doxbin:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px #ff3333;
            background: linear-gradient(135deg, #ff4444, #882222);
        }

        .btn-doxbin:active {
            transform: translateY(0) scale(0.99);
        }

        /* Menü Öğeleri */
        .menu-item {
            background: rgba(150, 30, 30, 0.15);
            border: 1px solid #993333;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 8px;
            color: #ffb3b3;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .menu-item:hover {
            background: rgba(200, 40, 40, 0.25);
            border-color: #ff6666;
            transform: translateX(4px);
            color: white;
            box-shadow: 0 0 20px rgba(255, 80, 80, 0.3);
        }

        /* Sohbet Bölümü */
        .chat-container {
            height: 400px;
            display: flex;
            flex-direction: column;
            background: rgba(10, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid #993333;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scroll-behavior: smooth;
        }

        .chat-message {
            margin-bottom: 12px;
            animation: messagePop 0.2s ease;
        }

        @keyframes messagePop {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-sender {
            font-size: 12px;
            color: #ff9999;
            margin-bottom: 2px;
        }

        .message-content {
            background: rgba(200, 40, 40, 0.15);
            border-left: 3px solid #ff4444;
            padding: 8px 12px;
            border-radius: 12px;
            color: #fff;
            word-break: break-word;
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid #993333;
        }

        .chat-input {
            flex: 1;
            background: rgba(30, 0, 0, 0.5);
            border: 1px solid #993333;
            border-radius: 25px;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: #ff6666;
            box-shadow: 0 0 15px #ff3333;
        }

        .chat-send {
            background: #cc3333;
            border: none;
            border-radius: 25px;
            width: 45px;
            height: 45px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-send:hover {
            background: #ff4444;
            transform: scale(1.05);
        }

        /* Kırmızı Tik */
        .red-tick {
            color: #ff4444;
            font-size: 22px;
            margin-left: 8px;
            filter: drop-shadow(0 0 5px #ff4444);
            animation: tickPulse 2s ease-in-out infinite;
        }

        @keyframes tickPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px #ff4444); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px #ff6666); }
        }

        /* Telegram Link */
        .telegram-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 100, 200, 0.2);
            border: 1px solid #0088cc;
            border-radius: 25px;
            padding: 8px 15px;
            color: #88ddff;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .telegram-link:hover {
            background: rgba(0, 136, 204, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px #0088cc;
            color: white;
        }

        /* Duyuru - 5 saniye sonra kaybolacak */
        .temp-announcement {
            background: rgba(200, 50, 50, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #ffaa00;
            border-radius: 12px;
            padding: 12px 20px;
            margin: 10px;
            color: white;
            font-weight: 600;
            animation: slideDown 0.3s ease, fadeOut 0.5s ease 4.5s forwards;
            position: relative;
            z-index: 50;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* Loader - Optimize */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #331111;
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a0a0a; }
        ::-webkit-scrollbar-thumb { background: #cc3333; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="main-bg"></div>
    <div class="matrix-bg"></div>

    <!-- GÜVENLİK KATMANI -->
    <div id="security-layer" class="fixed inset-0 z-50 flex items-center justify-center" style="background: rgba(10, 0, 0, 0.95); backdrop-filter: blur(10px);">
        <div class="glass-panel p-8 text-center max-w-sm w-11/12" style="animation: modalPop 0.3s ease;">
            <i class="fas fa-shield-halved text-5xl mb-4" style="color: #ff4444;"></i>
            <h2 class="doxbin-title text-3xl mb-2">DOXBİN</h2>
            <p class="mb-6 opacity-80 text-gray-300">Güvenlik katmanı başlatılıyor...</p>
            <button onclick="verifySecurity()" class="btn-doxbin">DOĞRULA</button>
        </div>
    </div>

    <!-- GİRİŞ/KAYIT MODAL -->
    <div id="auth-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden" style="background: rgba(10,0,0,0.95); backdrop-filter: blur(10px);">
        <div class="glass-panel p-8 max-w-md w-11/12">
            <div class="text-center mb-6">
                <h2 class="doxbin-title text-3xl">DOXBİN</h2>
                <p class="text-red-300 mt-2">FREE SORGU PANELİ</p>
            </div>
            
            <div class="flex gap-2 mb-6">
                <button onclick="switchAuthTab('login')" id="login-tab" class="flex-1 py-3 rounded-xl font-bold" style="background: #cc3333; color:white;">GİRİŞ</button>
                <button onclick="switchAuthTab('register')" id="register-tab" class="flex-1 py-3 rounded-xl font-bold" style="background: #331111; color:#ff9999;">KAYIT</button>
            </div>
            
            <div id="login-form">
                <div class="mb-4"><input type="text" id="login-username" placeholder="Kullanıcı Adı" class="input-doxbin"></div>
                <div class="mb-4"><input type="password" id="login-password" placeholder="Şifre" class="input-doxbin"></div>
                <button onclick="handleLogin()" class="btn-doxbin mb-3">GİRİŞ YAP</button>
            </div>
            
            <div id="register-form" style="display: none;">
                <div class="mb-4"><input type="text" id="reg-username" placeholder="Kullanıcı Adı" class="input-doxbin"></div>
                <div class="mb-4"><input type="password" id="reg-password" placeholder="Şifre" class="input-doxbin"></div>
                <div class="mb-4"><input type="password" id="reg-password2" placeholder="Şifre Tekrar" class="input-doxbin"></div>
                <button onclick="handleRegister()" class="btn-doxbin">KAYIT OL</button>
            </div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="main-app" class="hidden h-full flex flex-col">
        <!-- NAVBAR -->
        <nav class="glass-panel px-4 py-3 flex justify-between items-center mx-3 mt-2">
            <button onclick="toggleMenu()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background: #331111;">
                <i class="fas fa-bars text-xl" style="color: #ff6666;"></i>
            </button>
            <span class="doxbin-title text-2xl">DOXBİN FREE</span>
            <div class="flex items-center gap-2">
                <span id="user-badge" class="text-sm hidden px-3 py-1 rounded-full" style="background: #cc3333; color:white;"></span>
                <button onclick="logout()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#331111;">
                    <i class="fas fa-sign-out-alt text-xl" style="color: #ff6666;"></i>
                </button>
            </div>
        </nav>

        <!-- Duyuru Alanı (Geçici) -->
        <div id="announcement-container" class="mx-3 mt-2"></div>

        <!-- Menü -->
        <div id="sidebar" class="fixed top-0 left-0 h-full w-72 glass-panel z-40 transform -translate-x-full transition-transform duration-300 p-5 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-lg" style="color:#ff6666;">⚡ DOXBİN MENÜ</span>
                <button onclick="toggleMenu()" class="w-8 h-8 rounded-full flex items-center justify-center" style="background:#331111;">
                    <i class="fas fa-times" style="color:#ff6666;"></i>
                </button>
            </div>
            
            <div class="flex flex-col items-center mb-6">
                <div class="text-center mb-2">
                    <span class="text-4xl">🔥</span>
                </div>
                <div class="flex items-center justify-center gap-2">
                    <span class="font-bold text-xl" style="color:#ff9999;">DOXBİN FREE</span>
                    <i class="fas fa-check-circle red-tick"></i>
                </div>
                
                <!-- Telegram Kanal Yönlendirme -->
                <a href="https://t.me/doxbinhack" target="_blank" class="telegram-link">
                    <i class="fab fa-telegram-plane text-xl"></i>
                    <span>@doxbinhack</span>
                    <i class="fas fa-external-link-alt text-xs ml-auto"></i>
                </a>
            </div>
            
            <div class="font-bold text-md mb-2" style="color:#ff9999;">SORGULAR</div>
            <div id="menu-items" class="space-y-2"></div>
            
            <div class="divider my-4" style="border-color: #993333;"></div>
            
            <button onclick="showChat()" class="menu-item">
                <i class="fas fa-comments mr-2"></i>SOHBET
            </button>
            
            <div id="admin-menu-section" class="hidden mt-4">
                <div class="font-bold text-md mb-2" style="color: #ffaa00;">ADMIN</div>
                <button onclick="showAdminPanel()" class="menu-item"><i class="fas fa-crown mr-2"></i>Admin Paneli</button>
            </div>
        </div>

        <!-- Ana İçerik -->
        <main class="flex-1 overflow-y-auto p-4">
            <!-- Sorgu Kartı -->
            <div id="query-section" class="glass-panel p-5 mb-4">
                <h1 id="service-title" class="text-center font-bold text-xl mb-1" style="color:#ff9999;">TC Sorgu</h1>
                <p id="service-desc" class="text-center text-sm opacity-70 mb-4 text-gray-400">TC Kimlik No Girin</p>
                <div id="input-container" class="relative">
                    <input type="text" id="input-tc" placeholder="TC KİMLİK NO" class="input-doxbin mb-3">
                    <button onclick="runQuery()" class="btn-doxbin"><i class="fas fa-search mr-2"></i>SORGULA</button>
                </div>
            </div>

            <!-- Sonuç -->
            <div id="result-container" style="display: none;">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold flex items-center gap-2" style="color:#ff9999;"><i class="fas fa-dragon" style="color:#ff6666;"></i> SONUÇ</h3>
                    <div class="flex gap-2">
                        <button onclick="copyResult()" class="btn-doxbin" style="padding: 8px 14px; font-size:14px;"><i class="fas fa-copy mr-1"></i>KOPYALA</button>
                        <button onclick="downloadResult()" class="btn-doxbin" style="padding: 8px 14px; font-size:14px;"><i class="fas fa-download mr-1"></i>İNDİR</button>
                    </div>
                </div>
                <div id="output-box" class="glass-panel p-4"></div>
            </div>

            <!-- Sohbet Bölümü -->
            <div id="chat-section" style="display: none;">
                <div class="chat-container">
                    <div class="flex items-center gap-2 p-3" style="border-bottom: 1px solid #993333;">
                        <i class="fas fa-comments text-xl" style="color:#ff6666;"></i>
                        <span class="font-bold" style="color:#ff9999;">SOHBET - @doxbinhack</span>
                    </div>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" class="chat-input" placeholder="Mesaj yaz..." maxlength="200">
                        <button onclick="sendMessage()" class="chat-send">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Admin panel -->
            <div id="admin-panel" style="display: none;"> 
                <div class="glass-panel p-6">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2" style="color:#ffaa00;"><i class="fas fa-crown"></i> ADMIN PANELİ</h2>
                    
                    <div class="mb-6">
                        <h3 class="text-xl font-bold mb-4" style="color:#ff9999;">📢 Duyuru Yönetimi</h3>
                        <textarea id="announcement-text" class="input-doxbin" rows="3" placeholder="Duyuru metni..."></textarea>
                        <div class="flex gap-2 mt-3">
                            <button onclick="addAnnouncement()" class="btn-doxbin flex-1">DUYURU YAP</button>
                        </div>
                    </div>
                    
                    <div>
                        <h3 class="text-xl font-bold mb-4" style="color:#ff9999;">👥 Kullanıcılar</h3>
                        <div id="user-list" class="space-y-2 max-h-60 overflow-auto"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ========== PERFORMANS OPTİMİZASYONLARI ==========
        // RequestAnimationFrame ile animasyonlar
        const raf = window.requestAnimationFrame || window.webkitRequestAnimationFrame;
        
        // Hızlı DOM işlemleri için cache
        const domElements = {
            security: document.getElementById('security-layer'),
            authModal: document.getElementById('auth-modal'),
            mainApp: document.getElementById('main-app'),
            sidebar: document.getElementById('sidebar'),
            querySection: document.getElementById('query-section'),
            resultContainer: document.getElementById('result-container'),
            chatSection: document.getElementById('chat-section'),
            adminPanel: document.getElementById('admin-panel'),
            outputBox: document.getElementById('output-box'),
            userBadge: document.getElementById('user-badge'),
            menuItems: document.getElementById('menu-items'),
            inputContainer: document.getElementById('input-container'),
            serviceTitle: document.getElementById('service-title'),
            serviceDesc: document.getElementById('service-desc'),
            announcementContainer: document.getElementById('announcement-container'),
            chatMessages: document.getElementById('chat-messages'),
            chatInput: document.getElementById('chat-input')
        };

        // API Konfigürasyonu
        const API_CONFIG = {
            tc: 'https://apiservices.alwaysdata.net/apiservices/tc.php?tc=',
            tcpro: 'https://apiservices.alwaysdata.net/apiservices/tcpro.php?tc=',
            adsoyad: 'https://apiservices.alwaysdata.net/apiservices/adsoyad.php?',
            adsoyadpro: 'https://apiservices.alwaysdata.net/apiservices/adsoyadpro.php?',
            aile: 'https://apiservices.alwaysdata.net/apiservices/aile.php?tc=',
            ailepro: 'https://apiservices.alwaysdata.net/apiservices/ailepro.php?tc=',
            adres: 'https://apiservices.alwaysdata.net/apiservices/adres.php?tc=',
            tcgsm: 'https://apiservices.alwaysdata.net/apiservices/tcgsm.php?tc=',
            gsmtc: 'https://apiservices.alwaysdata.net/apiservices/gsmtc.php?gsm='
        };

        // Servisler
        const services = [
            { id: 'tc', name: '🔍 TC Sorgu', inputs: ['tc'] },
            { id: 'tcpro', name: '💎 TC Pro', inputs: ['tc'] },
            { id: 'adsoyad', name: '📇 Ad Soyad', inputs: ['ad', 'soyad'] },
            { id: 'adsoyadpro', name: '⚡ Ad Soyad Pro', inputs: ['ad', 'soyad', 'il'] },
            { id: 'aile', name: '👪 Aile Sorgu', inputs: ['tc'] },
            { id: 'ailepro', name: '👑 Aile Pro', inputs: ['tc'] },
            { id: 'adres', name: '🏠 Adres Sorgu', inputs: ['tc'] },
            { id: 'tcgsm', name: '📱 TC→GSM', inputs: ['tc'] },
            { id: 'gsmtc', name: '🔄 GSM→TC', inputs: ['gsm'] }
        ];

        // State
        let currentService = services[0];
        let currentUser = null;
        let isAdmin = false;
        let users = JSON.parse(localStorage.getItem('doxbin_users')) || [];
        let announcements = JSON.parse(localStorage.getItem('doxbin_announcements')) || [];
        let chatMessages = JSON.parse(localStorage.getItem('doxbin_chat')) || [
            { sender: 'System', message: 'Sohbete hoş geldiniz!', time: Date.now() }
        ];

        // Admin oluştur
        if (!users.some(u => u.username === 'doxbinadmin')) {
            users.push({ username: 'doxbinadmin', password: 'doxbinx', isAdmin: true, createdAt: new Date().toISOString() });
            localStorage.setItem('doxbin_users', JSON.stringify(users));
        }

        // ========== GÜVENLİK ==========
        function verifySecurity() {
            const btn = document.querySelector('#security-layer button');
            btn.innerHTML = '<div class="loader mx-auto"></div>';
            setTimeout(() => {
                domElements.security.style.display = 'none';
                domElements.authModal.classList.remove('hidden');
            }, 1000);
        }

        // ========== GİRİŞ/KAYIT ==========
        function switchAuthTab(tab) {
            if (tab === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
                document.getElementById('login-tab').style.background = '#cc3333';
                document.getElementById('register-tab').style.background = '#331111';
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
                document.getElementById('register-tab').style.background = '#cc3333';
                document.getElementById('login-tab').style.background = '#331111';
            }
        }

        function handleLogin() {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const user = users.find(x => x.username === u && x.password === p);
            
            if (user) {
                currentUser = user;
                isAdmin = user.isAdmin;
                domElements.authModal.classList.add('hidden');
                domElements.mainApp.classList.remove('hidden');
                domElements.userBadge.classList.remove('hidden');
                
                if (isAdmin) {
                    domElements.userBadge.innerHTML = '<i class="fas fa-crown mr-1"></i> ADMIN';
                    document.getElementById('admin-menu-section').classList.remove('hidden');
                } else {
                    domElements.userBadge.innerHTML = `<i class="fas fa-user mr-1"></i> ${u}`;
                }
                
                initMenu();
                showTempAnnouncements();
            } else {
                alert('Hatalı giriş!');
            }
        }

        function handleRegister() {
            const u = document.getElementById('reg-username').value;
            const p = document.getElementById('reg-password').value;
            const p2 = document.getElementById('reg-password2').value;
            
            if (!u || !p) return alert('Boş bırakmayın!');
            if (p !== p2) return alert('Şifreler uyuşmuyor!');
            if (users.some(x => x.username === u)) return alert('Kullanıcı adı alınmış!');
            
            users.push({ username: u, password: p, isAdmin: false, createdAt: new Date().toISOString() });
            localStorage.setItem('doxbin_users', JSON.stringify(users));
            alert('Kayıt başarılı! Giriş yapabilirsiniz.');
            switchAuthTab('login');
        }

        function logout() {
            currentUser = null;
            isAdmin = false;
            domElements.mainApp.classList.add('hidden');
            domElements.authModal.classList.remove('hidden');
        }

        // ========== MENÜ ==========
        function initMenu() {
            domElements.menuItems.innerHTML = '';
            services.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'menu-item';
                btn.innerHTML = s.name;
                btn.onclick = () => selectService(s);
                domElements.menuItems.appendChild(btn);
            });
        }

        function toggleMenu() {
            domElements.sidebar.classList.toggle('-translate-x-full');
        }

        function selectService(s) {
            currentService = s;
            toggleMenu();
            
            domElements.serviceTitle.innerText = s.name;
            domElements.serviceDesc.innerText = s.inputs.map(i => i.toUpperCase()).join(' + ');
            domElements.querySection.style.display = 'block';
            domElements.chatSection.style.display = 'none';
            domElements.adminPanel.style.display = 'none';
            domElements.resultContainer.style.display = 'none';
            
            domElements.inputContainer.innerHTML = '';
            s.inputs.forEach(i => {
                const inp = document.createElement('input');
                inp.placeholder = i.toUpperCase() + ' GİRİN';
                inp.id = 'input-' + i;
                inp.className = 'input-doxbin mb-3';
                domElements.inputContainer.appendChild(inp);
            });
            
            const btn = document.createElement('button');
            btn.className = 'btn-doxbin';
            btn.innerHTML = '<i class="fas fa-search mr-2"></i>SORGULA';
            btn.onclick = runQuery;
            domElements.inputContainer.appendChild(btn);
        }

        function showChat() {
            toggleMenu();
            domElements.querySection.style.display = 'none';
            domElements.resultContainer.style.display = 'none';
            domElements.adminPanel.style.display = 'none';
            domElements.chatSection.style.display = 'block';
            displayChatMessages();
        }

        function showAdminPanel() {
            toggleMenu();
            domElements.querySection.style.display = 'none';
            domElements.resultContainer.style.display = 'none';
            domElements.chatSection.style.display = 'none';
            domElements.adminPanel.style.display = 'block';
            updateAdminPanel();
        }

        // ========== SOHBET ==========
        function sendMessage() {
            const msg = domElements.chatInput.value.trim();
            if (!msg || !currentUser) return;
            
            chatMessages.push({
                sender: currentUser.username,
                message: msg,
                time: Date.now()
            });
            
            if (chatMessages.length > 50) chatMessages.shift();
            localStorage.setItem('doxbin_chat', JSON.stringify(chatMessages));
            
            domElements.chatInput.value = '';
            displayChatMessages();
        }

        function displayChatMessages() {
            domElements.chatMessages.innerHTML = '';
            chatMessages.forEach(msg => {
                const isOwn = msg.sender === currentUser?.username;
                domElements.chatMessages.innerHTML += `
                    <div class="chat-message">
                        <div class="message-sender" style="color: ${isOwn ? '#ff6666' : '#ff9999'}">
                            ${msg.sender} ${msg.sender === 'System' ? '🤖' : ''}
                        </div>
                        <div class="message-content" style="border-left-color: ${isOwn ? '#ff6666' : '#993333'}">
                            ${msg.message}
                        </div>
                    </div>
                `;
            });
            domElements.chatMessages.scrollTop = domElements.chatMessages.scrollHeight;
        }

        // ========== DUYURULAR (5 SN GÖSTER) ==========
        function showTempAnnouncements() {
            announcements.forEach(a => {
                const div = document.createElement('div');
                div.className = 'temp-announcement flex items-center gap-2';
                div.innerHTML = `<i class="fas fa-bullhorn" style="color:#ffaa00;"></i><span>${a.text}</span>`;
                domElements.announcementContainer.appendChild(div);
                
                setTimeout(() => {
                    if (div.parentNode) div.remove();
                }, 5000);
            });
        }

        function addAnnouncement() {
            const txt = document.getElementById('announcement-text').value;
            if (!txt || !isAdmin) return;
            
            announcements.push({ text: txt, date: new Date().toISOString() });
            localStorage.setItem('doxbin_announcements', JSON.stringify(announcements));
            document.getElementById('announcement-text').value = '';
            showTempAnnouncements();
            updateAdminPanel();
        }

        // ========== SORGU ==========
        async function runQuery() {
            let empty = false;
            currentService.inputs.forEach(i => {
                if (!document.getElementById(`input-${i}`)?.value) empty = true;
            });
            
            if (empty) return alert('Tüm alanları doldurun!');
            
            domElements.resultContainer.style.display = 'block';
            domElements.outputBox.innerHTML = '<div class="loader mx-auto"></div>';
            
            const apiUrl = currentService.inputs.length === 1 
                ? API_CONFIG[currentService.id] + document.getElementById(`input-${currentService.inputs[0]}`).value
                : API_CONFIG[currentService.id] + currentService.inputs.map(i => `${i}=${encodeURIComponent(document.getElementById(`input-${i}`).value)}`).join('&');
            
            try {
                const response = await fetch(apiUrl, {
                    headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
                });
                
                const data = await response.text();
                
                try {
                    const json = JSON.parse(data);
                    let html = '<div class="space-y-3">';
                    
                    Object.entries(json).forEach(([key, value]) => {
                        if (value && typeof value !== 'object') {
                            html += `
                                <div class="data-item">
                                    <div class="data-label">${key}</div>
                                    <div class="data-value">${value}</div>
                                </div>
                            `;
                        }
                    });
                    
                    html += '</div>';
                    domElements.outputBox.innerHTML = html;
                } catch {
                    domElements.outputBox.innerHTML = `<pre style="color:#ffaaaa;">${data}</pre>`;
                }
            } catch (error) {
                domElements.outputBox.innerHTML = `<div class="text-center text-red-400">Hata: ${error.message}</div>`;
            }
        }

        function copyResult() {
            navigator.clipboard.writeText(domElements.outputBox.innerText);
            alert('Kopyalandı!');
        }

        function downloadResult() {
            const text = domElements.outputBox.innerText;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([text]));
            a.download = 'doxbin_sonuc.txt';
            a.click();
        }

        // ========== ADMIN PANEL ==========
        function updateAdminPanel() {
            const userList = document.getElementById('user-list');
            userList.innerHTML = '';
            users.filter(u => !u.isAdmin).forEach(u => {
                userList.innerHTML += `
                    <div class="flex justify-between p-3" style="background: rgba(150,30,30,0.2); border-radius: 10px;">
                        <span style="color:#ff9999;">${u.username}</span>
                        <span class="text-xs opacity-70">${new Date(u.createdAt).toLocaleDateString()}</span>
                    </div>
                `;
            });
        }

        // Enter ile mesaj gönderme
        domElements.chatInput?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Başlangıç
        window.onload = () => {
            // Performans için gereksiz animasyonları azalt
            if (domElements.security) {
                setTimeout(() => {
                    // İlk yüklenme
                }, 100);
            }
        };
    </script>
</body>
</html>
